<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gruppi AD</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f5f6f8;
    }

    /* =======================
       TAB SUPERIORI
    ======================= */
    #tabs {
      position: fixed;
      top: 0;
      left: 0;
      width: 270px;
      height: 44px;
      display: flex;
      background: #111827;
      z-index: 20;
    }

    #tabs button {
      flex: 1;
      background: transparent;
      border: none;
      color: #9ca3af;
      font-size: 13px;
      cursor: pointer;
    }

    #tabs button.active {
      color: white;
      background: #1f2937;
      font-weight: 500;
    }

    /* =======================
       SIDEBAR
    ======================= */
    nav {
      position: fixed;
      top: 44px;
      left: 0;
      width: 270px;
      height: calc(100vh - 44px);
      background: #1f2937;
      color: white;
      padding: 8px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    nav h2 {
      margin: 8px 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
    }

    nav button {
      width: 100%;
      padding: 6px 10px;
      margin: 2px 0;
      background: transparent;
      color: #e5e7eb;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
    }

    /* zebra */
    nav button:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.03);
    }

    nav button:hover,
    nav button.active {
      background: #374151;
    }

    /* =======================
       MAIN
    ======================= */
    main {
      margin-left: 270px;
      padding: 16px 20px;
      flex: 1;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .header {
      margin-bottom: 14px;
    }

    .header h2 {
      margin: 0;
      font-weight: 500;
    }

    .header small {
      font-size: 13px;
      color: #6b7280;
    }

    /* =======================
       TOOLBAR
    ======================= */
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      font-size: 13px;
    }

    button.copy {
      padding: 6px 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    button.copy:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* =======================
       CARD + LISTA
    ======================= */
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px;
      max-width: 1100px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 6px 10px;
      border-bottom: 1px solid #e5e7eb;
      font-family: Consolas, monospace;
      font-size: 13px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f9fafb;
    }

    li:last-child {
      border-bottom: none;
    }

    .empty {
      margin-top: 20px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <!-- TAB -->
  <div id="tabs">
    <button class="tab active" data-type="internal">🏢 Sedi interne</button>
    <button class="tab" data-type="external">🧩 Società esterne</button>
  </div>

  <!-- SIDEBAR -->
  <nav id="menu">
    <h2>Sedi</h2>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="header">
      <h2 id="title">Sedi interne</h2>
      <small>Gestione e consultazione gruppi Active Directory</small>
    </div>

    <div class="toolbar">
      <input id="search" placeholder="Cerca gruppo...">
      <button class="copy" id="copyBtn" disabled>📋 Copia</button>
    </div>

    <div class="card">
      <ul id="list"></ul>
      <div id="empty" class="empty" style="display:none">
        Nessun gruppo disponibile
      </div>
    </div>
  </main>

  <!-- SCRIPT -->
  <script>
    fetch('./data.json')
      .then(r => r.json())
      .then(data => {

        const menu = document.getElementById("menu");
        const list = document.getElementById("list");
        const search = document.getElementById("search");
        const copyBtn = document.getElementById("copyBtn");
        const title = document.getElementById("title");
        const empty = document.getElementById("empty");

        let currentGroups = [];
        let internal = {};
        let external = {};

        function normalizeName(name) {
          return name.normalize("NFKD").replace(/\s+/g, " ").trim().toLowerCase();
        }

        function isExternal(name) {
          return /\bext\b/.test(normalizeName(name));
        }

        Object.keys(data).forEach(key => {
          if (isExternal(key)) {
            const clean = key.replace(/\bext\b/i, "").replace(/\s+/g, " ").trim();
            external[clean] = data[key];
          } else {
            internal[key] = data[key];
          }
        });

        function loadMenu(source) {
          menu.innerHTML = "<h2>Sedi</h2>";

          Object.keys(source).sort().forEach(name => {
            const btn = document.createElement("button");
            btn.textContent = name;

            btn.onclick = () => {
              document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
              btn.classList.add("active");
              showSede(name, source[name]);
            };

            menu.appendChild(btn);
          });
        }

        function showSede(name, groups) {
          currentGroups = [...groups].sort();
          title.textContent = `${name} (${currentGroups.length})`;
          search.value = "";
          copyBtn.disabled = false;
          render(currentGroups);
        }

        function render(arr) {
          list.innerHTML = "";
          empty.style.display = arr.length ? "none" : "block";

          arr.forEach(g => {
            const li = document.createElement("li");
            li.textContent = g;
            list.appendChild(li);
          });
        }

        search.oninput = () => {
          const q = search.value.toLowerCase();
          render(currentGroups.filter(g => g.toLowerCase().includes(q)));
        };

        copyBtn.onclick = () =>
          navigator.clipboard.writeText(currentGroups.join("\n"))
            .then(() => alert("✅ Gruppi copiati negli appunti"));

        document.querySelectorAll(".tab").forEach(tab => {
          tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            list.innerHTML = "";
            empty.style.display = "none";
            copyBtn.disabled = true;

            tab.dataset.type === "external"
              ? (title.textContent = "Società esterne", loadMenu(external))
              : (title.textContent = "Sedi interne", loadMenu(internal));
          };
        });

        loadMenu(internal);
      });
  </script>

</body>
</html>
