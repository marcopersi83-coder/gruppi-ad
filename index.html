<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gruppi AD</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; display: flex; height: 100vh; }
    nav { width: 260px; background: #2c3e50; color: white; padding: 10px; overflow-y: auto; }
    nav h2 { margin-top: 0; font-size: 16px; }
    nav button { width: 100%; padding: 8px; margin: 4px 0; background: #34495e; color: white; border: none; cursor: pointer; text-align: left; }
    nav button:hover { background: #1abc9c; }
    main { flex: 1; padding: 20px; overflow-y: auto; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; }
    button.copy { margin-bottom: 10px; padding: 8px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { padding: 4px 0; border-bottom: 1px solid #ddd; font-family: monospace; }
  </style>
</head>
<body>

<nav id="menu">
  <h2>Sedi</h2>
</nav>

<main>
  <h2 id="title">Gruppi AD</h2>
  <button class="copy" id="copyBtn" disabled>📋 Copia gruppi</button>
  <input id="search" placeholder="Cerca gruppo...">
  <ul id="list"></ul>
</main>

<script>
fetch('./data.json')
  .then(r => r.json())
  .then(data => {

    const menu = document.getElementById('menu');
    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const copyBtn = document.getElementById('copyBtn');
    const title = document.getElementById('title');

    let currentGroups = [];

    // ✅ ORDINA LE SEDI (menu a sinistra)
    Object.keys(data)
      .sort((a, b) => a.localeCompare(b))
      .forEach(sede => {
        const btn = document.createElement('button');
        btn.textContent = sede;
        btn.onclick = () => showSede(sede, data[sede]);
        menu.appendChild(btn);
      });

    function showSede(nome, gruppi) {
      // ✅ ORDINA I GRUPPI A–Z
      currentGroups = [...gruppi].sort((a, b) => a.localeCompare(b));
      title.textContent = "Gruppi AD – " + nome;
      search.value = "";
      copyBtn.disabled = false;
      render(currentGroups);
    }

    function render(arr) {
      list.innerHTML = "";
      arr.forEach(g => {
        const li = document.createElement('li');
        li.textContent = g;
        list.appendChild(li);
      });
    }

    search.oninput = () => {
      const q = search.value.toLowerCase();
      render(currentGroups.filter(g => g.toLowerCase().includes(q)));
    };

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(currentGroups.join("\n"))
        .then(() => alert("✅ Gruppi copiati negli appunti"));
    };
  });
</script>


</body>
</html>
