<script>
fetch('./data.json')
  .then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(data => {

    const menu = document.getElementById('menu');
    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const copyBtn = document.getElementById('copyBtn');
    const title = document.getElementById('title');

    let currentGroups = [];

    Object.keys(data).forEach(sede => {
      const b = document.createElement('button');
      b.textContent = sede;
      b.onclick = () => showSede(sede, data[sede]);
      menu.appendChild(b);
    });

    function showSede(nome, gruppi) {
      currentGroups = gruppi;
      title.textContent = "Gruppi AD – " + nome;
      search.value = "";
      render(gruppi);
      copyBtn.disabled = false;
    }

    function render(arr) {
      list.innerHTML = "";
      arr.forEach(x => {
        const li = document.createElement('li');
        li.textContent = x;
        list.appendChild(li);
      });
    }

    search.oninput = () => {
      const q = search.value.toLowerCase();
      render(currentGroups.filter(x => x.toLowerCase().includes(q)));
    };

    copyBtn.onclick = () => {
      if (currentGroups.length === 0) return;
      const text = currentGroups.join("\n");
      navigator.clipboard.writeText(text)
        .then(() => alert("✅ Gruppi copiati negli appunti"))
        .catch(err => alert("❌ Errore nella copia"));
    };

  })
  .catch(e => {
    document.body.innerHTML =
      "<h2>Errore nel caricamento dati</h2><pre>" + e + "</pre>";
  });
</script>
