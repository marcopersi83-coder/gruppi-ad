<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Gruppi AD</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f5f6f8;
    }

    /* ===== Tabs ===== */
    #tabs {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      display: flex;
      background: #111827;
      z-index: 10;
    }

    #tabs button {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 13px;
    }

    #tabs button.active {
      background: #1f2937;
      color: white;
    }

    /* ===== Sidebar ===== */
    nav {
      width: 280px;
      background: #1f2937;
      color: white;
      padding: 16px;
      padding-top: 56px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    nav h2 {
      margin-top: 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
    }

    nav button {
      width: 100%;
      padding: 10px 12px;
      margin: 4px 0;
      background: transparent;
      color: #e5e7eb;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
    }

    nav button:hover,
    nav button.active {
      background: #374151;
    }

    /* ===== Main ===== */
    main {
      flex: 1;
      padding: 24px;
      margin-left: 280px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    h2 {
      margin-top: 0;
      font-weight: 500;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    button.copy {
      padding: 8px 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button.copy:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    /* ===== List ===== */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      background: white;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    li {
      padding: 8px 12px;
      border-bottom: 1px solid #e5e7eb;
      font-family: Consolas, monospace;
      font-size: 13px;
    }

    li:last-child {
      border-bottom: none;
    }
  </style>
</head>

<body>

  <!-- ===== Tabs ===== -->
  <div id="tabs">
    <button class="tab active" data-type="internal">🏢 Sedi interne</button>
    <button class="tab" data-type="external">🧩 Società esterne</button>
  </div>

  <!-- ===== Sidebar ===== -->
  <nav id="menu">
    <h2>Sedi</h2>
  </nav>

  <!-- ===== Main ===== -->
  <main>
    <h2 id="title">Sedi interne</h2>

    <div class="toolbar">
      <input id="search" placeholder="Cerca gruppo...">
      <button class="copy" id="copyBtn" disabled>📋 Copia</button>
    </div>

    <ul id="list"></ul>
  </main>

  <!-- ===== Script ===== -->
  <script>
    fetch('./data.json')
      .then(r => r.json())
      .then(data => {

        const menu = document.getElementById("menu");
        const list = document.getElementById("list");
        const search = document.getElementById("search");
        const copyBtn = document.getElementById("copyBtn");
        const title = document.getElementById("title");

        let currentGroups = [];
        let internal = {};
        let external = {};

        function normalizeName(name) {
          return name
            .normalize("NFKD")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
        }

        function isExternal(name) {
          return /\bext\b/.test(normalizeName(name));
        }

        Object.keys(data).forEach(key => {
          if (isExternal(key)) {
            const cleanName = key
              .normalize("NFKD")
              .replace(/\bext\b/i, "")
              .replace(/\s+/g, " ")
              .trim();

            external[cleanName] = data[key];
          } else {
            internal[key] = data[key];
          }
        });

        function loadMenu(source) {
          menu.innerHTML = "<h2>Sedi</h2>";

          Object.keys(source)
            .sort((a, b) => a.localeCompare(b))
            .forEach(name => {
              const btn = document.createElement("button");
              btn.textContent = name;

              btn.onclick = () => {
                document
                  .querySelectorAll("nav button")
                  .forEach(b => b.classList.remove("active"));

                btn.classList.add("active");
                showSede(name, source[name]);
              };

              menu.appendChild(btn);
            });
        }

        function showSede(nome, gruppi) {
          currentGroups = [...gruppi].sort((a, b) => a.localeCompare(b));
          title.textContent = `${nome} (${currentGroups.length})`;
          search.value = "";
          copyBtn.disabled = false;
          render(currentGroups);
        }

        function render(arr) {
          list.innerHTML = "";
          arr.forEach(g => {
            const li = document.createElement("li");
            li.textContent = g;
            list.appendChild(li);
          });
        }

        search.oninput = () => {
          const q = search.value.toLowerCase();
          render(currentGroups.filter(g => g.toLowerCase().includes(q)));
        };

        copyBtn.onclick = () => {
          navigator.clipboard.writeText(currentGroups.join("\n"))
            .then(() => alert("✅ Gruppi copiati negli appunti"));
        };

        document.querySelectorAll(".tab").forEach(tab => {
          tab.onclick = () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");

            list.innerHTML = "";
            copyBtn.disabled = true;

            if (tab.dataset.type === "external") {
              title.textContent = "Società esterne";
              loadMenu(external);
            } else {
              title.textContent = "Sedi interne";
              loadMenu(internal);
            }
          };
        });

        loadMenu(internal);
      });
  </script>

</body>
</html>
